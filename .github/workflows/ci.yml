name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted. Run 'gofmt -w .':"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./... 2>&1 | tee test-output.txt

      - name: Coverage summary
        if: always()
        run: |
          if [ ! -f coverage.out ]; then
            echo "No coverage profile was generated." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          mod=$(go list -m)
          total=$(go tool cover -func=coverage.out | awk '/^total:/{print $NF}')
          {
            echo "## Test coverage"
            echo ""
            echo "**Total: ${total:-n/a}**"
            echo ""
            echo "| Package | Coverage |"
            echo "| --- | --- |"
            awk -v mod="$mod" '/coverage:/ {
              pkg = ""; pct = ""
              for (i = 1; i <= NF; i++) {
                if (index($i, mod "/") == 1) pkg = substr($i, length(mod) + 2)
                if ($i == "coverage:") pct = $(i + 1)
              }
              if (pkg != "") printf "| %s | %s |\n", pkg, pct
            }' test-output.txt
          } >> "$GITHUB_STEP_SUMMARY"

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2

      - name: Install dependencies
        run: bun install
        working-directory: docs

      - name: Build docs
        run: bun run build
        working-directory: docs
